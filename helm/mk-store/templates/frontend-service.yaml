apiVersion: v1
kind: Service
metadata:
  name: {{ include "mk-store.fullname" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "mk-store.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
