apiVersion: v1
kind: ConfigMap
metadata:
  name: mk-store-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  mk-store-dashboard.json: |
    {
      "title": "mk-store overview",
      "uid": "mk-store-overview",
      "version": 1,
      "schemaVersion": 39,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total Requests",
          "targets": [
            {
              "expr": "sum(requests_count)",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Response Time p95",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(response_timing_ms_bucket[5m])) by (le))",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          }
        }
      ],
      "time": {
        "from": "now-30m",
        "to": "now"
      }
    }
