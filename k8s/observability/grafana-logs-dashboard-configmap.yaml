apiVersion: v1
kind: ConfigMap
metadata:
  name: mk-store-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  mk-store-logs-dashboard.json: |
    {
      "title": "mk-store logs",
      "uid": "mk-store-logs",
      "version": 1,
      "schemaVersion": 39,
      "panels": [
        {
          "id": 1,
          "type": "logs",
          "title": "Application logs",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "{namespace=\"mk-store\"}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 18,
            "w": 24,
            "x": 0,
            "y": 0
          }
        }
      ],
      "time": {
        "from": "now-30m",
        "to": "now"
      }
    }
