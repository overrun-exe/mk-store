apiVersion: apps/v1
kind: Deployment
metadata:
  name: mk-store-backend
  namespace: mk-store
  labels:
    app: mk-store-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mk-store-backend
  template:
    metadata:
      labels:
        app: mk-store-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: backend
          image: registry.example.com/mk-store/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
